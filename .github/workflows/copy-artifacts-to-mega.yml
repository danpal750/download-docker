name: Copy Artifacts to MEGA

on:
  workflow_dispatch:
    inputs:
      artifact_name:
        description: 'Nombre del artifact (déjalo vacío para subir todos)'
        required: false
        default: ''

jobs:
  upload-to-mega:
    runs-on: ubuntu-latest
    
    steps:
      - name: Download specific artifact
        if: github.event.inputs.artifact_name != ''
        uses: actions/download-artifact@v4
        with:
          name: ${{ github.event.inputs.artifact_name }}
          path: ./artifacts
          github-token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Download all artifacts
        if: github.event.inputs.artifact_name == ''
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          github-token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: List downloaded files
        run: |
          echo "📁 Archivos descargados:"
          ls -lh ./artifacts/ || echo "No se descargaron archivos"
          
      - name: Install megatools
        run: |
          sudo apt update
          sudo apt install -y megatools
          
      - name: Configure MEGA credentials
        run: |
          mkdir -p ~/.megatools
          echo "[Credentials]" > ~/.megatools/credentials
          echo "Username = ${{ secrets.MEGA_EMAIL }}" >> ~/.megatools/credentials
          echo "Password = ${{ secrets.MEGA_PASSWORD }}" >> ~/.megatools/credentials
          chmod 600 ~/.megatools/credentials
          
      - name: Create MEGA folder
        run: |
          megamkdir /OmicsPlayground || echo "La carpeta ya existe"
          
      - name: Upload to MEGA
        run: |
          echo "📤 Subiendo archivos a MEGA..."
          cd ./artifacts
          
          for file in *; do
            if [ -f "$file" ]; then
              echo "Subiendo: $file"
              megaput "$file" --path /OmicsPlayground
              echo "✅ $file subido"
            fi
          done
          
      - name: Verify upload
        run: |
          echo "📋 Archivos en MEGA:"
          megals -l /OmicsPlayground || echo "No se pudo listar"
